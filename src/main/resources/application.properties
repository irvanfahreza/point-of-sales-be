spring.application.name=pos-backend

# ==============================================
# Server
# ==============================================
server.port=${PORT:8080}

# ==============================================
# Database (Local Development — override via env vars for prod/Neon)
# ==============================================
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ==============================================
# JPA / Hibernate
# ==============================================
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.datasource.hikari.connection-init-sql=SELECT 1
spring.datasource.hikari.maximum-pool-size=5

# ==============================================
# Flyway Migration (disabled — schema managed manually)
# ==============================================
spring.flyway.enabled=false

# ==============================================
# JWT
# ==============================================
app.jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
app.jwt.expiration=86400000

# ==============================================
# File Upload (for logo & CSV import)
# ==============================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=${UPLOAD_DIR:uploads}

# ==============================================
# Timezone
# ==============================================
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Jakarta

# ==============================================
# Springdoc / Swagger UI
# ==============================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=alpha

# ==============================================
# Logging
# ==============================================
logging.level.com.pos=DEBUG
logging.level.org.springframework.security=WARN

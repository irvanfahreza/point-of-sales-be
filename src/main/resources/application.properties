# ==============================================
# Server
# ==============================================
server.port=8080

# ==============================================
# Database (Local Development — override via env vars for prod/Neon)
# ==============================================
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/pos_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# ==============================================
# JPA / Hibernate
# ==============================================
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# ==============================================
# Flyway Migration
# ==============================================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# ==============================================
# JWT
# ==============================================
app.jwt.secret=${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
app.jwt.expiration=${JWT_EXPIRATION:86400000}

# ==============================================
# File Upload (for logo & CSV import)
# ==============================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=${UPLOAD_DIR:uploads}

# ==============================================
# Timezone
# ==============================================
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Jakarta

# ==============================================
# Springdoc / Swagger UI
# ==============================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=alpha

# ==============================================
# Logging
# ==============================================
logging.level.com.pos=DEBUG
logging.level.org.springframework.security=WARN
